project:
  type: book
  output-dir: _book

book:
  title: 'Reproducible Research for the Health Sciences'
  subtitle: 'Compendia, containers, and computational verification in R'
  author: "Ronald 'Ryy' G. Thomas"
  date: today
  date-format: 'YYYY-MM-DD'

  cover-image: images/cover.png
  favicon: images/favicon.png

  site-url: https://reproducibility.rgtlab.org
  repo-url: https://github.com/rgt47/reproducibility
  repo-branch: main
  repo-actions: [edit, issue]

  search: true
  page-navigation: true
  bread-crumbs: true
  sidebar:
    style: docked
    collapse-level: 1

  chapters:
    - half-title.qmd
    - copyright.qmd
    - index.qmd
    - preface.qmd
    - conventions.qmd
    - 00-intro.qmd

    - part: 'Foundations'
      chapters:
        - 01-reproducibility-crisis.qmd
        - 02-levels-of-reproducibility.qmd
        - 03-research-compendium.qmd

    - part: 'Capturing the Environment'
      chapters:
        - 04-dependencies.qmd
        - 05-containers.qmd
        - 06-backends-runtimes.qmd

    - part: 'Validation'
      chapters:
        - 07-literate-programming.qmd
        - 08-testing-quality.qmd
        - 09-continuous-integration.qmd

    - part: 'Collaboration and Stewardship'
      chapters:
        - 10-archiving-sharing.qmd

    - references.qmd

  appendices:
    - credits.qmd
    - colophon.qmd

format:
  html:
    theme:
      - cosmo
      - repro.scss
    code-link: true
    code-copy: hover
    code-overflow: wrap
    code-tools:
      source: repo
      toggle: false
    code-block-bg: true
    code-block-border-left: '#14746f'
    highlight-style: arrow
    fig-width: 7
    fig-height: 4.5
    fig-align: center
    tbl-cap-location: top
    toc: true
    toc-title: 'On this page'
    toc-depth: 3
    anchor-sections: true
    smooth-scroll: true

  pdf:
    documentclass: scrbook
    classoption: [11pt]
    toc: false
    highlight-style: arrow
    geometry:
      - paperwidth=6.5in
      - paperheight=9in
      - top=0.9in
      - bottom=0.9in
      - inner=0.9in
      - outer=0.7in
    include-in-header:
      text: |
        \usepackage{fontspec}
        \usepackage{graphicx}
        \setmonofont{DejaVu Sans Mono}[Scale=0.9]
    template-partials:
      - partials/before-body.tex

bibliography: references.bib
csl: https://www.zotero.org/styles/apa

execute:
  freeze: auto
  echo: true
  warning: false
  message: false

knitr:
  opts_chunk:
    comment: '#>'
    collapse: true
    fig.retina: 2
    dpi: 150
